services:
  # Node.js API 服务
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
    volumes:
      - ./server/data:/app/server/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Nginx 仅做反向代理 / TLS 入口
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      # 端口可通过环境变量覆盖：生产不传则默认 80，staging 用 NGINX_PORT=8080
      - "${NGINX_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
