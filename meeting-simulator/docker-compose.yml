services:
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-meetinghero}
      MYSQL_USER: ${MYSQL_USER:-meetinghero}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-meetinghero}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Node.js API 服务
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-meetinghero}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-meetinghero}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-meetinghero}
      - MYSQL_CONNECTION_LIMIT=${MYSQL_CONNECTION_LIMIT:-10}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Nginx 仅做反向代理 / TLS 入口
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      # 端口可通过环境变量覆盖：生产不传则默认 80，staging 用 NGINX_PORT=8080
      - "${NGINX_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
